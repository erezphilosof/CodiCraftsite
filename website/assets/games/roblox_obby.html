<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>2D Roblox Style Obby - 7 Levels</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: linear-gradient(#6ed6ff, #dff7ff);
    font-family: Arial, sans-serif;
    text-align: center;
    overflow: hidden;
  }
  h1 {
    margin: 8px 0 4px;
    color: #1b1b1b;
  }
  #hud {
    font-size: 18px;
    margin-bottom: 6px;
    font-weight: bold;
  }
  canvas {
    background: #8ee7ff;
    border: 5px solid #222;
    display: block;
    margin: 0 auto;
    max-width: 96vw;
    max-height: 72vh;
  }
  #buttons {
    margin-top: 8px;
  }
  button {
    font-size: 20px;
    padding: 10px 16px;
    margin: 3px;
    border: 0;
    border-radius: 10px;
    background: #222;
    color: white;
    cursor: pointer;
  }
  button:active { transform: scale(0.96); }
  #msg {
    font-size: 18px;
    margin-top: 6px;
    min-height: 24px;
  }
</style>
</head>
<body>
<h1>🧱 2D Roblox Obby</h1>
<div id="hud">Level: <span id="levelText">1</span>/7 | Deaths: <span id="deathsText">0</span></div>
<canvas id="game" width="900" height="520"></canvas>
<div id="buttons">
  <button onpointerdown="keys.left=true" onpointerup="keys.left=false">⬅️</button>
  <button onclick="jump()">⬆️ Jump</button>
  <button onpointerdown="keys.right=true" onpointerup="keys.right=false">➡️</button>
  <button onclick="restartLevel()">Restart</button>
</div>
<div id="msg">Move with A/D or arrow keys. Jump with W, Up, or Space.</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const levelText = document.getElementById("levelText");
const deathsText = document.getElementById("deathsText");
const msg = document.getElementById("msg");

const keys = { left:false, right:false };
let level = 0;
let deaths = 0;

const player = {
  x: 60, y: 400, w: 32, h: 42,
  vx: 0, vy: 0,
  speed: 5,
  jumpPower: 14,
  grounded: false
};

const levels = [
  {
    name: "Easy Start",
    spawn: [60, 400],
    platforms: [
      [0, 480, 180, 40], [230, 440, 120, 25], [400, 400, 130, 25],
      [580, 360, 120, 25], [740, 480, 160, 40]
    ],
    lava: [[180, 500, 560, 20]],
    finish: [820, 420, 45, 60]
  },
  {
    name: "Lava Hops",
    spawn: [40, 400],
    platforms: [
      [0, 480, 130, 40], [190, 430, 90, 25], [340, 380, 90, 25],
      [500, 430, 90, 25], [660, 380, 90, 25], [810, 480, 90, 40]
    ],
    lava: [[130, 500, 680, 20]],
    finish: [830, 420, 45, 60]
  },
  {
    name: "Tiny Blocks",
    spawn: [40, 400],
    platforms: [
      [0, 480, 120, 40], [175, 420, 70, 22], [310, 360, 65, 22],
      [450, 300, 65, 22], [600, 360, 65, 22], [740, 420, 70, 22],
      [830, 480, 70, 40]
    ],
    lava: [[120, 500, 710, 20]],
    finish: [840, 420, 45, 60]
  },
  {
    name: "Spike Trouble",
    spawn: [50, 400],
    platforms: [
      [0, 480, 250, 40], [330, 430, 110, 25], [520, 380, 110, 25],
      [710, 330, 110, 25], [820, 480, 80, 40]
    ],
    lava: [[250, 500, 570, 20]],
    spikes: [[145, 450, 30, 30], [365, 400, 30, 30], [560, 350, 30, 30], [750, 300, 30, 30]],
    finish: [840, 420, 45, 60]
  },
  {
    name: "Wall Climb",
    spawn: [40, 400],
    platforms: [
      [0, 480, 150, 40], [190, 420, 90, 22], [120, 350, 90, 22],
      [250, 280, 90, 22], [400, 350, 90, 22], [550, 280, 90, 22],
      [700, 210, 90, 22], [810, 480, 90, 40]
    ],
    lava: [[150, 500, 660, 20]],
    finish: [825, 420, 45, 60]
  },
  {
    name: "Moving Danger",
    spawn: [40, 400],
    platforms: [
      [0, 480, 130, 40], [200, 430, 100, 22], [380, 380, 100, 22],
      [560, 330, 100, 22], [740, 480, 160, 40]
    ],
    lava: [[130, 500, 610, 20]],
    movers: [
      {x:250,y:470,w:70,h:20,minX:180,maxX:500,speed:2.5},
      {x:570,y:470,w:70,h:20,minX:500,maxX:720,speed:-2.2}
    ],
    finish: [820, 420, 45, 60]
  },
  {
    name: "Final Mega Obby",
    spawn: [35, 400],
    platforms: [
      [0, 480, 110, 40], [170, 420, 65, 20], [300, 365, 65, 20],
      [430, 310, 65, 20], [570, 250, 65, 20], [710, 360, 65, 20],
      [820, 480, 80, 40]
    ],
    lava: [[110, 500, 710, 20]],
    spikes: [[190,390,25,30],[320,335,25,30],[450,280,25,30],[590,220,25,30],[730,330,25,30]],
    movers: [
      {x:520,y:430,w:80,h:18,minX:430,maxX:700,speed:3}
    ],
    finish: [835, 420, 45, 60]
  }
];

function rectsTouch(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function arrRect(r) { return {x:r[0], y:r[1], w:r[2], h:r[3]}; }

function restartLevel() {
  const sp = levels[level].spawn;
  player.x = sp[0];
  player.y = sp[1];
  player.vx = 0;
  player.vy = 0;
  msg.textContent = "Level " + (level + 1) + ": " + levels[level].name;
}

function die() {
  deaths++;
  deathsText.textContent = deaths;
  msg.textContent = "Oof! Try again.";
  restartLevel();
}

function jump() {
  if (player.grounded) {
    player.vy = -player.jumpPower;
    player.grounded = false;
  }
}

function nextLevel() {
  if (level < levels.length - 1) {
    level++;
    levelText.textContent = level + 1;
    msg.textContent = "Nice! Level " + (level + 1) + ": " + levels[level].name;
    restartLevel();
  } else {
    msg.textContent = "🎉 YOU WON ALL 7 LEVELS! You are an obby master!";
    level = 0;
    levelText.textContent = 1;
    setTimeout(restartLevel, 1200);
  }
}

document.addEventListener("keydown", e => {
  if (e.key === "ArrowLeft" || e.key.toLowerCase() === "a") keys.left = true;
  if (e.key === "ArrowRight" || e.key.toLowerCase() === "d") keys.right = true;
  if (e.key === "ArrowUp" || e.key.toLowerCase() === "w" || e.key === " ") jump();
});
document.addEventListener("keyup", e => {
  if (e.key === "ArrowLeft" || e.key.toLowerCase() === "a") keys.left = false;
  if (e.key === "ArrowRight" || e.key.toLowerCase() === "d") keys.right = false;
});

function update() {
  const L = levels[level];

  if (L.movers) {
    for (const m of L.movers) {
      m.x += m.speed;
      if (m.x < m.minX || m.x + m.w > m.maxX) m.speed *= -1;
    }
  }

  player.vx = 0;
  if (keys.left) player.vx = -player.speed;
  if (keys.right) player.vx = player.speed;

  player.x += player.vx;
  player.x = Math.max(0, Math.min(canvas.width - player.w, player.x));

  player.vy += 0.7;
  player.y += player.vy;
  player.grounded = false;

  const allPlatforms = L.platforms.map(arrRect);
  if (L.movers) allPlatforms.push(...L.movers);

  for (const p of allPlatforms) {
    if (rectsTouch(player, p)) {
      const oldBottom = player.y + player.h - player.vy;
      if (oldBottom <= p.y + 8 && player.vy >= 0) {
        player.y = p.y - player.h;
        player.vy = 0;
        player.grounded = true;
        if (L.movers && L.movers.includes(p)) player.x += p.speed;
      }
    }
  }

  for (const l of L.lava) {
    if (rectsTouch(player, arrRect(l))) die();
  }

  if (L.spikes) {
    for (const s of L.spikes) {
      if (rectsTouch(player, arrRect(s))) die();
    }
  }

  if (player.y > canvas.height + 100) die();

  const finish = arrRect(L.finish);
  if (rectsTouch(player, finish)) nextLevel();
}

function drawRobloxPlayer(x, y) {
  // head
  ctx.fillStyle = "#ffd56b";
  ctx.fillRect(x + 6, y, 20, 20);
  // face
  ctx.fillStyle = "#111";
  ctx.fillRect(x + 11, y + 7, 3, 3);
  ctx.fillRect(x + 20, y + 7, 3, 3);
  ctx.fillRect(x + 14, y + 14, 8, 2);
  // body
  ctx.fillStyle = "#1687ff";
  ctx.fillRect(x + 3, y + 22, 26, 20);
  // arms
  ctx.fillStyle = "#ffd56b";
  ctx.fillRect(x - 4, y + 23, 7, 20);
  ctx.fillRect(x + 29, y + 23, 7, 20);
  // legs
  ctx.fillStyle = "#222";
  ctx.fillRect(x + 5, y + 42, 9, 16);
  ctx.fillRect(x + 18, y + 42, 9, 16);
}

function draw() {
  const L = levels[level];
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // sky details
  ctx.fillStyle = "rgba(255,255,255,0.85)";
  ctx.beginPath(); ctx.arc(130,80,28,0,Math.PI*2); ctx.arc(165,78,35,0,Math.PI*2); ctx.arc(205,82,25,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(650,110,24,0,Math.PI*2); ctx.arc(680,105,32,0,Math.PI*2); ctx.arc(720,112,24,0,Math.PI*2); ctx.fill();

  // lava
  for (const l of L.lava) {
    ctx.fillStyle = "#ff3b00";
    ctx.fillRect(l[0], l[1], l[2], l[3]);
    ctx.fillStyle = "#ffcc00";
    for (let i = l[0]; i < l[0]+l[2]; i += 30) {
      ctx.fillRect(i, l[1]+5, 16, 5);
    }
  }

  // platforms
  for (const p of L.platforms) {
    ctx.fillStyle = "#7b4a24";
    ctx.fillRect(p[0], p[1], p[2], p[3]);
    ctx.fillStyle = "#22b14c";
    ctx.fillRect(p[0], p[1], p[2], 7);
  }

  // moving platforms
  if (L.movers) {
    for (const m of L.movers) {
      ctx.fillStyle = "#8e44ff";
      ctx.fillRect(m.x, m.y, m.w, m.h);
      ctx.fillStyle = "#d9b3ff";
      ctx.fillRect(m.x+8, m.y+5, m.w-16, 5);
    }
  }

  // spikes
  if (L.spikes) {
    for (const s of L.spikes) {
      ctx.fillStyle = "#555";
      ctx.beginPath();
      ctx.moveTo(s[0], s[1]+s[3]);
      ctx.lineTo(s[0]+s[2]/2, s[1]);
      ctx.lineTo(s[0]+s[2], s[1]+s[3]);
      ctx.closePath();
      ctx.fill();
    }
  }

  // finish flag
  const f = L.finish;
  ctx.fillStyle = "#111";
  ctx.fillRect(f[0], f[1], 6, f[3]);
  ctx.fillStyle = "#00ff66";
  ctx.fillRect(f[0]+6, f[1], f[2], 28);
  ctx.fillStyle = "#111";
  ctx.font = "16px Arial";
  ctx.fillText("FINISH", f[0]-8, f[1]-8);

  drawRobloxPlayer(player.x, player.y);

  ctx.fillStyle = "#111";
  ctx.font = "24px Arial";
  ctx.fillText("Level " + (level+1) + ": " + L.name, 20, 35);
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

restartLevel();
loop();
</script>
</body>
</html>
