<section id="contacto" class="dynamic-section">
    <style>
        .contact-hover-wrapper {
            direction: rtl;
            text-align: center;
            max-width: 600px;
            margin: 0 auto;
            padding: 60px 20px;
            cursor: default;
        }
        
        .contact-title-main {
            font-size: 3.5rem;
            color: white;
            margin: 0 0 10px 0;
            transition: text-shadow 0.3s ease, transform 0.3s ease;
        }
        
        /* Pulse hover guide text */
        .contact-guide-text {
            color: #64748b;
            font-size: 1.1rem;
            margin: 0 0 30px 0;
            transition: color 0.3s ease, opacity 0.3s ease;
            animation: pulse-guide 2s infinite ease-in-out;
        }
        
        @keyframes pulse-guide {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        .contact-hover-wrapper:hover .contact-guide-text {
            color: #94a3b8;
            animation: none;
            opacity: 1;
        }
        
        .contact-hover-wrapper:hover .contact-title-main {
            text-shadow: 0 0 25px rgba(99, 102, 241, 0.4);
        }

        /* Hidden icons container by default */
        .contact-links-row {
            display: flex;
            gap: 40px;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transform: translateY(20px);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 20px;
        }

        /* Reveal on hover */
        .contact-hover-wrapper:hover .contact-links-row {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        /* Circular buttons styling */
        .contact-circle-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: #64748b;
            transition: all 0.3s ease;
        }

        .icon-circle-wrapper {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #94a3b8;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .btn-label-text {
            font-size: 0.95rem;
            font-weight: 500;
            color: #94a3b8;
            transition: color 0.3s ease;
        }

        /* WhatsApp Hover Effects */
        .whatsapp-btn:hover .icon-circle-wrapper {
            background: rgba(37, 211, 102, 0.12);
            border-color: rgba(37, 211, 102, 0.5);
            color: #25d366;
            box-shadow: 0 0 25px rgba(37, 211, 102, 0.25);
            transform: scale(1.12);
        }
        .whatsapp-btn:hover .btn-label-text {
            color: #25d366;
        }

        /* LinkedIn Hover Effects */
        .linkedin-btn:hover .icon-circle-wrapper {
            background: rgba(10, 102, 194, 0.12);
            border-color: rgba(10, 102, 194, 0.5);
            color: #0077b5;
            box-shadow: 0 0 25px rgba(10, 102, 194, 0.25);
            transform: scale(1.12);
        }
        .linkedin-btn:hover .btn-label-text {
            color: #0077b5;
        }
        @media (max-width: 768px) {
            .contact-links-row {
                opacity: 1;
                visibility: visible;
                transform: translateY(0);
                gap: 20px;
                flex-wrap: wrap;
            }
            .contact-guide-text {
                display: none !important;
            }
            .contact-title-main {
                font-size: 2.2rem;
            }
        }
    </style>
